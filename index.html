<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accounting App</title>
    <link rel="stylesheet" href="./app/styles/main.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <script>
      setTimeout(function () {
        var n = document.createElement('p');
        n.id = 'preload-notice';
        n.textContent = 'Loading\u2026';
        document.body.prepend(n);
        new MutationObserver(function (_, obs) {
          var el = document.getElementById('preload-notice');
          if (el) el.remove();
          obs.disconnect();
        }).observe(document.getElementById('app'), { childList: true });
      }, 200);
    </script>
    <noscript>
      <h2>How to launch Accounting App</h2>
      <p>This app requires JavaScript and a local server. Open a terminal in the project folder and run:</p>
      <ul>
        <li><strong>Windows:</strong> <code>launch.bat</code></li>
        <li><strong>macOS:</strong> <code>launch.command</code></li>
        <li><strong>Linux:</strong> <code>./launch.sh</code></li>
      </ul>
      <p>Then open <a href="http://localhost:10800">http://localhost:10800</a> in your browser.</p>
      <p>No Node.js? Download it at <a href="https://nodejs.org/">nodejs.org</a>.</p>
    </noscript>
    <main id="app"></main>
    <script type="module" src="./app/main.js"></script>
  </body>
</html>
